{% extends "base.html" %}
{% block title %}Log in - Attendance System{% endblock %}

{% block content %}

<!-- Signature element: quiet fingerprint-ridge motif, drawn as
     concentric organic arcs rather than a literal icon. -->
<svg class="ridge-motif" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M32 6 C18 6 8 17 8 31 C8 45 17 55 30 58" stroke="#2f6f63" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M32 13 C21 13 14 21 14 31 C14 42 20 50 29 53" stroke="#2f6f63" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
  <path d="M32 20 C24 20 20 25 20 31 C20 38 24 44 30 47" stroke="#c98a3e" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <path d="M32 27 C28 27 26 29 26 31 C26 35 28 38 31 40" stroke="#2f6f63" stroke-width="2.4" stroke-linecap="round"/>
</svg>

<div class="eyebrow">Secure sign-in</div>
<h1>Attendance System</h1>
<p class="subtitle">Sign in to look up and record student attendance.</p>

<form method="POST" action="{{ url_for('login') }}">
  <label for="username">Username</label>
  <input type="text" id="username" name="username" autocomplete="username" required>

  <label for="password">Password</label>
  <input type="password" id="password" name="password" autocomplete="current-password" required>

  <div class="actions">
    <button type="submit" class="btn btn-primary" style="flex:1">Sign in</button>
  </div>
</form>

<p class="muted center mt-24">Demo credentials: <span class="mono">admin</span> / <span class="mono">1234</span></p>

{% endblock %}
